# Automatically creates a GitHub Release with built artifacts (Linux .AppImage,
# Windows .exe) whenever the minor or major version changes in package.json.
# Patch bumps (1.2.8 → 1.2.9) do NOT trigger a release — only minor/major do.
#
# All builds run on GitHub-hosted runners — you don't need to do anything locally.
# Just push a package.json version bump to main and the workflow handles the rest.

name: Release

on:
  push:
    branches: [main]
    paths:
      - "package.json"

permissions:
  contents: write # required to create releases and push tags

jobs:
  # ─── Version Gate ────────────────────────────────────────────
  # Determines whether this push should trigger a new release.
  # Extracts the current minor version (e.g. "1.3" from "1.3.0")
  # and compares it against the latest published release tag.
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read current version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Extract major.minor (e.g. "1.3" from "1.3.0")
          MINOR_VERSION=$(echo "${VERSION}" | sed -E 's/^([0-9]+\.[0-9]+).*/\1/')
          echo "minor_version=${MINOR_VERSION}" >> "$GITHUB_OUTPUT"

          # Get latest release tag, if any
          LATEST_TAG=$(gh release list -L 1 --json tagName --jq '.[0].tagName // ""')
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

          # Extract minor from latest tag, if it exists
          if [ -z "${LATEST_TAG}" ]; then
            # No existing releases — always release the first time
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No existing releases found — will create first release."
          else
            LATEST_MINOR=$(echo "${LATEST_TAG}" | sed -E 's/^v?([0-9]+\.[0-9]+).*/\1/')
            if [ "${MINOR_VERSION}" != "${LATEST_MINOR}" ]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "Minor version changed: ${LATEST_MINOR} → ${MINOR_VERSION} — will release."
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Minor version unchanged (${MINOR_VERSION}) — skipping release."
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Build ───────────────────────────────────────────────────
  # Runs electron-builder for Linux and Windows in parallel.
  # Only executes when version-check says should_release=true.
  build:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_pattern: "dist/*.AppImage"
          - os: windows-latest
            target: win
            artifact_pattern: "dist/*.exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Next.js + electron-builder (${{ matrix.target }})
        run: npm run electron:build:${{ matrix.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error

  # ─── Release ─────────────────────────────────────────────────
  # Collects all build artifacts, creates a Git tag, and publishes
  # the GitHub Release with auto-generated release notes.
  release:
    needs: [version-check, build]
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Git tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: v${{ needs.version-check.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ github.token }}
